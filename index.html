

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — Hossam Samsung</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--accent:#00b7ff;--accent2:#00e5ff;--gold:#ffd700;--bg:#050505;--bg2:#0a0a0a;--card:#0e0e0e;--border:#1f1f1f;--text:#e8e8e8;--text2:#a0a0a0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);padding:20px;line-height:1.7;}
.container{max-width:1000px;margin:auto;}
h1{color:var(--accent);font-size:28px;margin-bottom:30px;display:flex;align-items:center;gap:12px;}
h1 i{font-size:24px;}
h2{font-size:20px;color:#fff;margin:30px 0 15px;display:flex;align-items:center;gap:10px;}
h2 i{color:var(--accent);}

.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:25px;margin-bottom:25px;}
input,textarea,select{
  width:100%;padding:14px 16px;margin:8px 0;border-radius:12px;
  border:1px solid #333;background:#111;color:#fff;font-family:'Cairo',sans-serif;font-size:15px;
  transition:0.3s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 15px rgba(0,183,255,0.1);}
textarea{min-height:80px;resize:vertical;}
label{display:block;color:var(--text2);font-size:13px;margin:12px 0 4px;font-weight:600;}
.hint{color:#666;font-size:12px;margin-top:4px;}

.btn{
  display:inline-flex;align-items:center;gap:10px;padding:14px 28px;border-radius:12px;
  border:none;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;
  transition:0.3s;margin-top:10px;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;box-shadow:0 4px 20px rgba(0,183,255,0.25);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,183,255,0.35);}
.btn-danger{background:linear-gradient(135deg,#ff4757,#ff6b81);color:#fff;}
.btn-danger:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,71,87,0.3);}
.btn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}

.product-item{
  display:flex;align-items:center;gap:16px;background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;padding:16px;margin-bottom:12px;transition:0.3s;
}
.product-item:hover{border-color:rgba(0,183,255,0.3);}
.product-item img{width:70px;height:70px;object-fit:cover;border-radius:12px;background:#111;}
.product-info{flex:1;}
.product-info h4{font-size:18px;color:#fff;margin-bottom:4px;}
.product-info p{color:var(--text2);font-size:14px;}
.product-actions{display:flex;gap:8px;}
.product-actions button{padding:10px 18px;font-size:13px;margin:0;}

.color-row{
  display:flex;gap:10px;align-items:flex-start;background:#0a0a0a;
  border:1px solid #222;border-radius:12px;padding:15px;margin:10px 0;
}
.color-row input{flex:1;margin:0;}
.color-row .btn{padding:10px 14px;font-size:12px;margin:0;}

.alert{
  padding:16px 20px;border-radius:12px;margin-bottom:20px;font-weight:600;display:none;
}
.alert-success{background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.3);color:#25d366;}
.alert-error{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);color:#ff6b81;}

.tabs{display:flex;gap:8px;margin-bottom:25px;border-bottom:1px solid var(--border);padding-bottom:15px;}
.tab{padding:12px 24px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:0.3s;font-weight:600;}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text2);}
.empty-state i{font-size:48px;color:var(--text3);margin-bottom:16px;}

@media(max-width:768px){
  .color-row{flex-direction:column;}
  .product-item{flex-direction:column;text-align:center;}
  .product-actions{width:100%;justify-content:center;}
}
</style>
</head>
<body>
<div class="container">
  <h1><i class="fas fa-cog"></i> لوحة تحكم Hossam Samsung</h1>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('add',this)"><i class="fas fa-plus"></i> إضافة منتج</div>
    <div class="tab" onclick="switchTab('list',this)"><i class="fas fa-list"></i> المنتجات</div>
  </div>

  <div id="alertBox" class="alert"></div>

  <!-- ADD PRODUCT -->
  <div id="tab-add" class="tab-content active">
    <div class="card">
      <h2><i class="fas fa-plus-circle"></i> منتج جديد</h2>
      
      <label>اسم المنتج</label>
      <input id="name" placeholder="مثال: Galaxy S24 Ultra">
      
      <label>السعر الأساسي (لو مفيش ألوان)</label>
      <input id="price" placeholder="مثال: 48,500">
      
      <label>رابط الصورة الأساسية</label>
      <input id="image" placeholder="https://...">
      
      <label>المواصفات الأساسية</label>
      <textarea id="spec" placeholder="256GB / 12GB RAM • Dual SIM • Box + Cable"></textarea>
      
      <hr style="border-color:#222;margin:25px 0;">
      
      <h2><i class="fas fa-palette"></i> الألوان (اختياري)</h2>
      <p class="hint">لو المنتج له أكتر من لون وسعر مختلف، ضيفهم هنا. لو منتج واحد بس، سيبهم فاضيين.</p>
      
      <div id="colorsContainer"></div>
      <button class="btn btn-secondary" onclick="addColorRow()"><i class="fas fa-plus"></i> إضافة لون</button>
      
      <hr style="border-color:#222;margin:25px 0;">
      
      <button class="btn btn-primary" onclick="addProduct()"><i class="fas fa-save"></i> حفظ المنتج</button>
    </div>
  </div>

  <!-- LIST PRODUCTS -->
  <div id="tab-list" class="tab-content">
    <div class="card">
      <h2><i class="fas fa-boxes"></i> المنتجات المضافة</h2>
      <div id="productsList">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== FIREBASE COMPAT MODE ===== -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ✅ Firebase Config مُصلح — نفس المشروع: hossam-72f79
const firebaseConfig = {
  apiKey: "AIzaSyC6BeFZCFK6gYsxG0zO4UJzPeZZbhAllU",
  authDomain: "hossam-72f79.firebaseapp.com",
  projectId: "hossam-72f79",
  storageBucket: "hossam-72f79.appspot.com",  // ✅ صلّحتها
  messagingSenderId: "756116202818",
  appId: "1:756116202818:web:8883cf3d6ea170d02dd4db",
  measurementId: "G-S3YTS658KX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== TABS =====
function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

// ===== ALERT =====
function showAlert(msg, type){
  const box = document.getElementById('alertBox');
  box.className = 'alert alert-'+type;
  box.innerHTML = '<i class="fas fa-'+(type==='success'?'check-circle':'exclamation-circle')+'"></i> '+msg;
  box.style.display = 'block';
  setTimeout(()=>{box.style.display='none';},4000);
}

// ===== COLOR ROWS =====
function addColorRow(){
  const container = document.getElementById('colorsContainer');
  const id = Date.now();
  container.innerHTML += `
    <div class="color-row" id="color-${id}">
      <input placeholder="اسم اللون" class="c-name">
      <input placeholder="السعر" class="c-price">
      <input placeholder="رابط الصورة" class="c-image">
      <input placeholder="المواصفات" class="c-spec">
      <input placeholder="كود اللون (#hex)" class="c-hex" value="#666">
      <button class="btn btn-danger" onclick="document.getElementById('color-${id}').remove()"><i class="fas fa-trash"></i></button>
    </div>
  `;
}

// ===== ADD PRODUCT =====
function addProduct(){
  const name = document.getElementById('name').value.trim();
  const price = document.getElementById('price').value.trim();
  const image = document.getElementById('image').value.trim();
  const spec = document.getElementById('spec').value.trim();
  
  if(!name){showAlert('اكتب اسم المنتج', 'error'); return;}
  
  const colorRows = document.querySelectorAll('.color-row');
  const colors = [];
  colorRows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    if(inputs[0].value.trim()){
      colors.push({
        colorName: inputs[0].value.trim(),
        price: inputs[1].value.trim(),
        image: inputs[2].value.trim(),
        spec: inputs[3].value.trim(),
        colorHex: inputs[4].value.trim() || '#666'
      });
    }
  });
  
  const data = {
    name: name,
    price: price,
    image: image,
    spec: spec,
    colors: colors.length > 0 ? colors : null,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()  // ✅ server timestamp أحسن
  };
  
  if(!data.price) delete data.price;
  if(!data.image) delete data.image;
  if(!data.spec) delete data.spec;
  if(!data.colors) delete data.colors;
  
  db.collection("products").add(data)
    .then(() => {
      showAlert('تمت إضافة المنتج بنجاح!', 'success');
      document.getElementById('name').value = '';
      document.getElementById('price').value = '';
      document.getElementById('image').value = '';
      document.getElementById('spec').value = '';
      document.getElementById('colorsContainer').innerHTML = '';
    })
    .catch(err => {
      console.error("Add Error:", err);
      showAlert('خطأ: '+err.message, 'error');
    });
}

// ===== LOAD & DELETE =====
function loadProducts(){
  const list = document.getElementById('productsList');
  
  db.collection("products").orderBy('createdAt','desc').onSnapshot(snap => {
    if(snap.empty){
      list.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><p>لا توجد منتجات</p></div>`;
      return;
    }
    
    list.innerHTML = '';
    snap.forEach(doc => {
      const p = doc.data();
      list.innerHTML += `
        <div class="product-item">
          <img src="${p.image || p.colors?.[0]?.image || 'https://via.placeholder.com/70'}" alt="${p.name}">
          <div class="product-info">
            <h4>${p.name}</h4>
            <p>${p.price || p.colors?.[0]?.price || '0'} جنيه • ${p.colors?.length || 0} ألوان</p>
          </div>
          <div class="product-actions">
            <button class="btn btn-danger" onclick="deleteProduct('${doc.id}')"><i class="fas fa-trash"></i> حذف</button>
          </div>
        </div>
      `;
    });
  }, err => {
    console.error("Load Error:", err);
    list.innerHTML = `<div class="empty-state" style="color:#ff6b81;"><i class="fas fa-exclamation-triangle"></i><p>خطأ في الاتصال بـ Firebase</p></div>`;
  });
}

function deleteProduct(id){
  if(confirm('هل تريد حذف هذا المنتج؟')){
    db.collection("products").doc(id).delete()
      .then(() => showAlert('تم الحذف', 'success'))
      .catch(err => {
        console.error("Delete Error:", err);
        showAlert('خطأ: '+err.message, 'error');
      });
  }
}

loadProducts();
</script>
</body>
</html>
