<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — Hossam Samsung</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--accent:#00b7ff;--accent2:#00e5ff;--gold:#ffd700;--bg:#050505;--bg2:#0a0a0a;--card:#0e0e0e;--border:#1f1f1f;--text:#e8e8e8;--text2:#a0a0a0;--text3:#666;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);padding:20px;line-height:1.7;}
.container{max-width:1000px;margin:auto;}
h1{color:var(--accent);font-size:28px;margin-bottom:30px;display:flex;align-items:center;gap:12px;}
h1 i{font-size:24px;}
h2{font-size:20px;color:#fff;margin:30px 0 15px;display:flex;align-items:center;gap:10px;}
h2 i{color:var(--accent);}

.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:25px;margin-bottom:25px;}
input,textarea,select{
  width:100%;padding:14px 16px;margin:8px 0;border-radius:12px;
  border:1px solid #333;background:#111;color:#fff;font-family:'Cairo',sans-serif;font-size:15px;
  transition:0.3s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 15px rgba(0,183,255,0.1);}
textarea{min-height:80px;resize:vertical;}
label{display:block;color:var(--text2);font-size:13px;margin:12px 0 4px;font-weight:600;}
.hint{color:#666;font-size:12px;margin-top:4px;}

.btn{
  display:inline-flex;align-items:center;gap:10px;padding:14px 28px;border-radius:12px;
  border:none;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;
  transition:0.3s;margin-top:10px;
}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;box-shadow:0 4px 20px rgba(0,183,255,0.25);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,183,255,0.35);}
.btn-danger{background:linear-gradient(135deg,#ff4757,#ff6b81);color:#fff;}
.btn-danger:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,71,87,0.3);}
.btn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-success{background:linear-gradient(135deg,#25d366,#2ecc71);color:#fff;}
.btn-success:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(37,211,102,0.3);}
.btn-warning{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;}
.btn-warning:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(243,156,18,0.3);}
.btn-sm{padding:8px 16px;font-size:13px;margin:0;}
.btn-xs{padding:6px 12px;font-size:11px;margin:0;}

/* Upload Area */
.upload-area{
  border:2px dashed #333;border-radius:16px;padding:30px;text-align:center;
  background:#0a0a0a;cursor:pointer;transition:0.3s;margin:8px 0;
}
.upload-area:hover{border-color:var(--accent);background:rgba(0,183,255,0.05);}
.upload-area.has-file{border-color:var(--accent);background:rgba(0,183,255,0.1);}
.upload-area i{font-size:32px;color:var(--text3);margin-bottom:10px;}
.upload-area.has-file i{color:var(--accent);}
.upload-area p{color:var(--text2);font-size:14px;margin-bottom:5px;}
.upload-area .file-name{color:var(--accent);font-weight:700;font-size:13px;}
.upload-area input[type="file"]{display:none;}

/* Image Preview */
.img-preview{
  width:100%;max-width:200px;height:140px;object-fit:cover;border-radius:12px;
  border:1px solid var(--border);margin:10px auto;display:none;
}
.img-preview.show{display:block;}

/* Progress Bar */
.progress-bar{
  width:100%;height:6px;background:#222;border-radius:3px;margin:10px 0;overflow:hidden;display:none;
}
.progress-bar.show{display:block;}
.progress-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:3px;transition:width 0.3s;width:0%;
}
.progress-text{color:var(--accent);font-size:12px;text-align:center;margin-top:5px;display:none;}
.progress-text.show{display:block;}

.product-item{
  display:flex;align-items:center;gap:16px;background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;padding:16px;margin-bottom:12px;transition:0.3s;
}
.product-item:hover{border-color:rgba(0,183,255,0.3);}
.product-item img{width:70px;height:70px;object-fit:cover;border-radius:12px;background:#111;}
.product-info{flex:1;}
.product-info h4{font-size:18px;color:#fff;margin-bottom:4px;}
.product-info p{color:var(--text2);font-size:14px;}
.product-actions{display:flex;gap:8px;flex-wrap:wrap;}
.product-actions button{padding:10px 18px;font-size:13px;margin:0;}

.color-row{
  display:flex;gap:10px;align-items:flex-start;background:#0a0a0a;
  border:1px solid #222;border-radius:12px;padding:15px;margin:10px 0;
}
.color-row input{flex:1;margin:0;}
.color-row .upload-area{padding:15px;flex:1;}
.color-row .upload-area i{font-size:20px;}
.color-row .upload-area p{font-size:12px;}
.color-row .btn{padding:10px 14px;font-size:12px;margin:0;}

.alert{
  padding:16px 20px;border-radius:12px;margin-bottom:20px;font-weight:600;display:none;
}
.alert-success{background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.3);color:#25d366;}
.alert-error{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);color:#ff6b81;}
.alert-info{background:rgba(0,183,255,0.1);border:1px solid rgba(0,183,255,0.3);color:var(--accent);}

.tabs{display:flex;gap:8px;margin-bottom:25px;border-bottom:1px solid var(--border);padding-bottom:15px;flex-wrap:wrap;}
.tab{padding:12px 24px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:0.3s;font-weight:600;}
.tab.active{background:var(--accent);color:#000;border-color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text2);}
.empty-state i{font-size:48px;color:var(--text3);margin-bottom:16px;}

/* Search Bar */
.search-box{
  display:flex;gap:10px;margin-bottom:20px;
}
.search-box input{
  flex:1;margin:0;
}

/* Order Controls */
.order-controls{
  display:flex;gap:8px;align-items:center;margin-bottom:15px;
}
.order-controls select{
  width:auto;padding:10px 16px;margin:0;
}

/* Preview Modal */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.85);z-index:1000;justify-content:center;align-items:center;
  padding:20px;
}
.modal-overlay.active{display:flex;}
.modal-content{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  max-width:500px;width:100%;max-height:90vh;overflow-y:auto;padding:30px;
}
.modal-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;
}
.modal-header h3{color:var(--accent);font-size:22px;}
.modal-close{
  background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;
}
.modal-close:hover{color:#fff;}

/* Preview Card */
.preview-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;
}
.preview-card img{
  width:100%;max-width:250px;height:auto;border-radius:12px;margin-bottom:15px;
}
.preview-card h4{font-size:22px;color:#fff;margin-bottom:8px;}
.preview-card .price{font-size:24px;color:var(--accent);font-weight:800;margin-bottom:10px;}
.preview-card .spec{color:var(--text2);font-size:14px;}
.preview-colors{
  display:flex;gap:8px;justify-content:center;margin-top:15px;flex-wrap:wrap;
}
.preview-color{
  display:flex;align-items:center;gap:6px;background:#111;border:1px solid #333;
  border-radius:8px;padding:6px 12px;font-size:12px;
}
.preview-color-dot{width:16px;height:16px;border-radius:50%;}

/* Drag Handle */
.drag-handle{
  color:var(--text3);cursor:grab;padding:8px;font-size:18px;
}
.drag-handle:active{cursor:grabbing;}
.product-item.dragging{opacity:0.5;border-color:var(--accent);}

/* Sort Badge */
.sort-badge{
  background:var(--accent);color:#000;font-size:11px;font-weight:700;
  padding:2px 8px;border-radius:6px;margin-right:8px;
}

@media(max-width:768px){
  .color-row{flex-direction:column;}
  .color-row input{width:100%;}
  .color-row .upload-area{width:100%;}
  .product-item{flex-direction:column;text-align:center;}
  .product-actions{width:100%;justify-content:center;}
  .order-controls{flex-direction:column;align-items:stretch;}
  .order-controls select{width:100%;}
}
</style>
</head>
<body>
<div class="container">
  <h1><i class="fas fa-cog"></i> لوحة تحكم Hossam Samsung</h1>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('add',this)"><i class="fas fa-plus"></i> إضافة منتج</div>
    <div class="tab" onclick="switchTab('list',this)"><i class="fas fa-list"></i> المنتجات</div>
  </div>

  <div id="alertBox" class="alert"></div>

  <!-- ADD / EDIT PRODUCT -->
  <div id="tab-add" class="tab-content active">
    <div class="card">
      <h2 id="formTitle"><i class="fas fa-plus-circle"></i> منتج جديد</h2>
      
      <input type="hidden" id="editId" value="">
      
      <label>اسم المنتج</label>
      <input id="name" placeholder="مثال: Galaxy S24 Ultra">
      
      <label>السعر الأساسي (لو مفيش ألوان)</label>
      <input id="price" placeholder="مثال: 48,500">
      
      <!-- Main Image Upload -->
      <label>صورة المنتج الأساسية</label>
      <input type="hidden" id="imageUrl" value="">
      <div class="upload-area" id="mainUploadArea" onclick="document.getElementById('mainImageFile').click()">
        <input type="file" id="mainImageFile" accept="image/*" onchange="handleMainImageUpload(this)">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>اضغط هنا أو اسحب صورة للرفع</p>
        <p class="file-name" id="mainFileName"></p>
        <img class="img-preview" id="mainImgPreview" alt="preview">
        <div class="progress-bar" id="mainProgressBar"><div class="progress-bar-fill" id="mainProgressFill"></div></div>
        <div class="progress-text" id="mainProgressText">0%</div>
      </div>
      <p class="hint">الصورة هترفع على Cloudinary تلقائياً</p>
      
      <label>المواصفات الأساسية</label>
      <textarea id="spec" placeholder="256GB / 12GB RAM • Dual SIM • Box + Cable"></textarea>
      
      <hr style="border-color:#222;margin:25px 0;">
      
      <h2><i class="fas fa-palette"></i> الألوان (اختياري)</h2>
      <p class="hint">لو المنتج له أكتر من لون وسعر مختلف، ضيفهم هنا. كل لون ممكن يرفع صورته.</p>
      
      <div id="colorsContainer"></div>
      <button class="btn btn-secondary" onclick="addColorRow()"><i class="fas fa-plus"></i> إضافة لون</button>
      
      <hr style="border-color:#222;margin:25px 0;">
      
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="saveProduct()"><i class="fas fa-save"></i> <span id="saveBtnText">حفظ المنتج</span></button>
        <button class="btn btn-secondary" onclick="previewProduct()"><i class="fas fa-eye"></i> معاينة</button>
        <button class="btn btn-danger" onclick="resetForm()" id="cancelBtn" style="display:none;"><i class="fas fa-times"></i> إلغاء</button>
      </div>
    </div>
  </div>

  <!-- LIST PRODUCTS -->
  <div id="tab-list" class="tab-content">
    <div class="card">
      <h2><i class="fas fa-boxes"></i> المنتجات المضافة</h2>
      
      <!-- Search -->
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 ابحث باسم المنتج أو السعر..." oninput="filterProducts()">
      </div>
      
      <!-- Order Controls -->
      <div class="order-controls">
        <label style="margin:0;">الترتيب:</label>
        <select id="sortOrder" onchange="changeSortOrder()">
          <option value="newest">الأحدث أولاً</option>
          <option value="oldest">الأقدم أولاً</option>
          <option value="priceHigh">الأعلى سعراً</option>
          <option value="priceLow">الأقل سعراً</option>
          <option value="nameAZ">الاسم أ-ي</option>
          <option value="nameZA">الاسم ي-أ</option>
          <option value="custom">ترتيب يدوي (سحب وإفلات)</option>
        </select>
        <button class="btn btn-sm btn-secondary" onclick="saveCustomOrder()" id="saveOrderBtn" style="display:none;">
          <i class="fas fa-save"></i> حفظ الترتيب
        </button>
      </div>
      
      <div id="productsList">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3><i class="fas fa-eye"></i> معاينة المنتج</h3>
      <button class="modal-close" onclick="closePreview()"><i class="fas fa-times"></i></button>
    </div>
    <div id="previewBody"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ✅ Firebase Config (Firestore بس)
const firebaseConfig = {
  apiKey: "AIzaSyC6BeFZCFK6gYsxG0zO4UJzPeZZbhAllU",
  authDomain: "hossam-72f79.firebaseapp.com",
  projectId: "hossam-72f79",
  storageBucket: "hossam-72f79.appspot.com",
  messagingSenderId: "756116202818",
  appId: "1:756116202818:web:8883cf3d6ea170d02dd4db",
  measurementId: "G-S3YTS658KX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== CLOUDINARY CONFIG =====
const CLOUDINARY_CLOUD_NAME = '453a34e4ff6b796c13037c91545e98';
const CLOUDINARY_UPLOAD_PRESET = 'samsung_products';

// ===== STATE =====
let allProducts = [];
let currentSort = 'newest';
let isEditing = false;
let draggedItem = null;

// ===== TABS =====
function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

// ===== ALERT =====
function showAlert(msg, type){
  const box = document.getElementById('alertBox');
  const icons = {success:'check-circle', error:'exclamation-circle', info:'info-circle'};
  box.className = 'alert alert-'+type;
  box.innerHTML = '<i class="fas fa-'+icons[type]+'"></i> '+msg;
  box.style.display = 'block';
  setTimeout(()=>{box.style.display='none';},4000);
}

// ===== UPLOAD TO CLOUDINARY =====
function uploadToCloudinary(file, onProgress, onComplete, onError){
  if(!file) return;
  
  const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`;
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  
  const xhr = new XMLHttpRequest();
  
  xhr.upload.addEventListener('progress', (e) => {
    if(e.lengthComputable){
      const progress = (e.loaded / e.total) * 100;
      onProgress(progress);
    }
  });
  
  xhr.addEventListener('load', () => {
    if(xhr.status === 200){
      const response = JSON.parse(xhr.responseText);
      onComplete(response.secure_url);
    } else {
      onError(new Error('Upload failed: ' + xhr.statusText));
    }
  });
  
  xhr.addEventListener('error', () => {
    onError(new Error('Network error'));
  });
  
  xhr.open('POST', url);
  xhr.send(formData);
}

// ===== MAIN IMAGE UPLOAD =====
function handleMainImageUpload(input){
  const file = input.files[0];
  if(!file) return;
  
  if(!file.type.startsWith('image/')){
    showAlert('الملف لازم يكون صورة', 'error');
    return;
  }
  
  const area = document.getElementById('mainUploadArea');
  const preview = document.getElementById('mainImgPreview');
  const fileName = document.getElementById('mainFileName');
  const progressBar = document.getElementById('mainProgressBar');
  const progressFill = document.getElementById('mainProgressFill');
  const progressText = document.getElementById('mainProgressText');
  
  area.classList.add('has-file');
  fileName.textContent = file.name;
  preview.src = URL.createObjectURL(file);
  preview.classList.add('show');
  progressBar.classList.add('show');
  progressText.classList.add('show');
  
  uploadToCloudinary(file,
    (progress) => {
      progressFill.style.width = progress + '%';
      progressText.textContent = Math.round(progress) + '%';
    },
    (url) => {
      document.getElementById('imageUrl').value = url;
      progressFill.style.width = '100%';
      progressText.textContent = '✅ تم الرفع!';
      progressText.style.color = '#25d366';
      showAlert('تم رفع الصورة بنجاح!', 'success');
      setTimeout(() => {
        progressBar.classList.remove('show');
        progressText.classList.remove('show');
      }, 2000);
    },
    (error) => {
      progressText.textContent = '❌ فشل الرفع';
      progressText.style.color = '#ff6b81';
      showAlert('فشل رفع الصورة: ' + error.message, 'error');
    }
  );
}

// ===== COLOR IMAGE UPLOAD =====
function handleColorImageUpload(input, colorId){
  const file = input.files[0];
  if(!file) return;
  
  if(!file.type.startsWith('image/')){
    showAlert('الملف لازم يكون صورة', 'error');
    return;
  }
  
  const area = document.getElementById('color-upload-'+colorId);
  const preview = document.getElementById('color-preview-'+colorId);
  const fileName = document.getElementById('color-filename-'+colorId);
  const progressBar = document.getElementById('color-progress-'+colorId);
  const progressFill = document.getElementById('color-progressfill-'+colorId);
  const progressText = document.getElementById('color-progresstext-'+colorId);
  const urlInput = document.getElementById('color-url-'+colorId);
  
  area.classList.add('has-file');
  fileName.textContent = file.name;
  preview.src = URL.createObjectURL(file);
  preview.classList.add('show');
  progressBar.classList.add('show');
  progressText.classList.add('show');
  
  uploadToCloudinary(file,
    (progress) => {
      progressFill.style.width = progress + '%';
      progressText.textContent = Math.round(progress) + '%';
    },
    (url) => {
      urlInput.value = url;
      progressFill.style.width = '100%';
      progressText.textContent = '✅ تم الرفع!';
      progressText.style.color = '#25d366';
      setTimeout(() => {
        progressBar.classList.remove('show');
        progressText.classList.remove('show');
      }, 2000);
    },
    (error) => {
      progressText.textContent = '❌ فشل';
      progressText.style.color = '#ff6b81';
      showAlert('فشل رفع صورة اللون: ' + error.message, 'error');
    }
  );
}

// ===== COLOR ROWS =====
function addColorRow(data = null){
  const container = document.getElementById('colorsContainer');
  const id = Date.now() + Math.random().toString(36).substr(2, 9);
  const div = document.createElement('div');
  div.className = 'color-row';
  div.id = 'color-'+id;
  div.innerHTML = `
    <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
      <input placeholder="اسم اللون" class="c-name" value="${data ? data.colorName : ''}">
      <input placeholder="السعر" class="c-price" value="${data ? data.price : ''}">
      
      <input type="hidden" id="color-url-${id}" class="c-image-hidden" value="${data ? data.image : ''}">
      <div class="upload-area" id="color-upload-${id}" onclick="document.getElementById('color-file-${id}').click()">
        <input type="file" id="color-file-${id}" accept="image/*" onchange="handleColorImageUpload(this,'${id}')">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>رفع صورة اللون</p>
        <p class="file-name" id="color-filename-${id}"></p>
        <img class="img-preview" id="color-preview-${id}" alt="preview">
        <div class="progress-bar" id="color-progress-${id}"><div class="progress-bar-fill" id="color-progressfill-${id}"></div></div>
        <div class="progress-text" id="color-progresstext-${id}">0%</div>
      </div>
      
      <input placeholder="المواصفات" class="c-spec" value="${data ? data.spec : ''}">
      <input placeholder="كود اللون (#hex)" class="c-hex" value="${data ? (data.colorHex || '#666') : '#666'}">
    </div>
    <button class="btn btn-danger" onclick="document.getElementById('color-${id}').remove()"><i class="fas fa-trash"></i></button>
  `;
  container.appendChild(div);
  
  if(data && data.image){
    setTimeout(() => {
      const preview = document.getElementById('color-preview-'+id);
      const area = document.getElementById('color-upload-'+id);
      if(preview && area){
        preview.src = data.image;
        preview.classList.add('show');
        area.classList.add('has-file');
        document.getElementById('color-filename-'+id).textContent = 'صورة محفوظة';
      }
    }, 100);
  }
}

// ===== RESET FORM =====
function resetForm(){
  document.getElementById('editId').value = '';
  document.getElementById('name').value = '';
  document.getElementById('price').value = '';
  document.getElementById('imageUrl').value = '';
  document.getElementById('spec').value = '';
  document.getElementById('colorsContainer').innerHTML = '';
  
  const mainArea = document.getElementById('mainUploadArea');
  const mainPreview = document.getElementById('mainImgPreview');
  mainArea.classList.remove('has-file');
  mainPreview.classList.remove('show');
  mainPreview.src = '';
  document.getElementById('mainFileName').textContent = '';
  document.getElementById('mainProgressFill').style.width = '0%';
  
  document.getElementById('formTitle').innerHTML = '<i class="fas fa-plus-circle"></i> منتج جديد';
  document.getElementById('saveBtnText').textContent = 'حفظ المنتج';
  document.getElementById('cancelBtn').style.display = 'none';
  isEditing = false;
}

// ===== SAVE PRODUCT =====
function saveProduct(){
  const editId = document.getElementById('editId').value;
  const name = document.getElementById('name').value.trim();
  const price = document.getElementById('price').value.trim();
  const image = document.getElementById('imageUrl').value.trim();
  const spec = document.getElementById('spec').value.trim();
  
  if(!name){showAlert('اكتب اسم المنتج', 'error'); return;}
  
  const colorRows = document.querySelectorAll('.color-row');
  const colors = [];
  colorRows.forEach(row => {
    const nameInput = row.querySelector('.c-name');
    const priceInput = row.querySelector('.c-price');
    const urlInput = row.querySelector('.c-image-hidden');
    const specInput = row.querySelector('.c-spec');
    const hexInput = row.querySelector('.c-hex');
    
    if(nameInput && nameInput.value.trim()){
      colors.push({
        colorName: nameInput.value.trim(),
        price: priceInput ? priceInput.value.trim() : '',
        image: urlInput ? urlInput.value.trim() : '',
        spec: specInput ? specInput.value.trim() : '',
        colorHex: hexInput ? (hexInput.value.trim() || '#666') : '#666'
      });
    }
  });
  
  const data = {
    name: name,
    price: price,
    image: image,
    spec: spec,
    colors: colors.length > 0 ? colors : null,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  
  if(!data.price) delete data.price;
  if(!data.image) delete data.image;
  if(!data.spec) delete data.spec;
  if(!data.colors) delete data.colors;
  
  if(editId){
    db.collection("products").doc(editId).update(data)
      .then(() => {
        showAlert('تم تعديل المنتج بنجاح!', 'success');
        resetForm();
        switchTab('list', document.querySelectorAll('.tab')[1]);
      })
      .catch(err => {
        console.error("Update Error:", err);
        showAlert('خطأ: '+err.message, 'error');
      });
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    data.sortOrder = Date.now();
    db.collection("products").add(data)
      .then(() => {
        showAlert('تمت إضافة المنتج بنجاح!', 'success');
        resetForm();
      })
      .catch(err => {
        console.error("Add Error:", err);
        showAlert('خطأ: '+err.message, 'error');
      });
  }
}

// ===== EDIT PRODUCT =====
function editProduct(id){
  const product = allProducts.find(p => p.id === id);
  if(!product) return;
  
  const p = product.data;
  document.getElementById('editId').value = id;
  document.getElementById('name').value = p.name || '';
  document.getElementById('price').value = p.price || '';
  document.getElementById('imageUrl').value = p.image || '';
  document.getElementById('spec').value = p.spec || '';
  
  if(p.image){
    const mainArea = document.getElementById('mainUploadArea');
    const mainPreview = document.getElementById('mainImgPreview');
    mainPreview.src = p.image;
    mainPreview.classList.add('show');
    mainArea.classList.add('has-file');
    document.getElementById('mainFileName').textContent = 'صورة محفوظة';
  }
  
  document.getElementById('colorsContainer').innerHTML = '';
  if(p.colors && p.colors.length > 0){
    p.colors.forEach(c => addColorRow(c));
  }
  
  document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل منتج';
  document.getElementById('saveBtnText').textContent = 'حفظ التعديلات';
  document.getElementById('cancelBtn').style.display = 'inline-flex';
  isEditing = true;
  
  switchTab('add', document.querySelectorAll('.tab')[0]);
  showAlert('جاري تعديل: ' + p.name, 'info');
}

// ===== DUPLICATE PRODUCT =====
function duplicateProduct(id){
  const product = allProducts.find(p => p.id === id);
  if(!product) return;
  
  const p = product.data;
  const data = {
    name: p.name + ' (نسخة)',
    price: p.price || '',
    image: p.image || '',
    spec: p.spec || '',
    colors: p.colors || null,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    sortOrder: Date.now()
  };
  
  if(!data.price) delete data.price;
  if(!data.image) delete data.image;
  if(!data.spec) delete data.spec;
  if(!data.colors) delete data.colors;
  
  db.collection("products").add(data)
    .then(() => showAlert('تم نسخ المنتج بنجاح!', 'success'))
    .catch(err => {
      console.error("Duplicate Error:", err);
      showAlert('خطأ: '+err.message, 'error');
    });
}

// ===== PREVIEW PRODUCT =====
function previewProduct(){
  const name = document.getElementById('name').value.trim();
  const price = document.getElementById('price').value.trim();
  const image = document.getElementById('imageUrl').value.trim();
  const spec = document.getElementById('spec').value.trim();
  
  const colorRows = document.querySelectorAll('.color-row');
  const colors = [];
  colorRows.forEach(row => {
    const nameInput = row.querySelector('.c-name');
    const priceInput = row.querySelector('.c-price');
    const urlInput = row.querySelector('.c-image-hidden');
    const specInput = row.querySelector('.c-spec');
    const hexInput = row.querySelector('.c-hex');
    
    if(nameInput && nameInput.value.trim()){
      colors.push({
        colorName: nameInput.value.trim(),
        price: priceInput ? priceInput.value.trim() : '',
        image: urlInput ? urlInput.value.trim() : '',
        spec: specInput ? specInput.value.trim() : '',
        colorHex: hexInput ? (hexInput.value.trim() || '#666') : '#666'
      });
    }
  });
  
  let html = '<div class="preview-card">';
  const displayImage = image || (colors[0] && colors[0].image) || 'https://via.placeholder.com/250';
  const displayPrice = price || (colors[0] && colors[0].price) || '0';
  const displaySpec = spec || (colors[0] && colors[0].spec) || '';
  
  html += `<img src="${displayImage}" alt="${name}" onerror="this.src='https://via.placeholder.com/250'">`;
  html += `<h4>${name || 'اسم المنتج'}</h4>`;
  html += `<div class="price">${displayPrice} جنيه</div>`;
  if(displaySpec) html += `<div class="spec">${displaySpec}</div>`;
  
  if(colors.length > 0){
    html += '<div class="preview-colors">';
    colors.forEach(c => {
      html += `<div class="preview-color">
        <div class="preview-color-dot" style="background:${c.colorHex}"></div>
        <span>${c.colorName}</span>
        <span style="color:var(--accent)">${c.price} ج</span>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  
  document.getElementById('previewBody').innerHTML = html;
  document.getElementById('previewModal').classList.add('active');
}

function closePreview(){
  document.getElementById('previewModal').classList.remove('active');
}
function closeModal(e){
  if(e.target === document.getElementById('previewModal')){
    closePreview();
  }
}

// ===== FILTER PRODUCTS =====
function filterProducts(){
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  renderProducts(allProducts, query);
}

// ===== CHANGE SORT ORDER =====
function changeSortOrder(){
  currentSort = document.getElementById('sortOrder').value;
  const saveBtn = document.getElementById('saveOrderBtn');
  
  if(currentSort === 'custom'){
    saveBtn.style.display = 'inline-flex';
    showAlert('اسحب المنتجات لإعادة ترتيبها، ثم اضغط حفظ الترتيب', 'info');
  } else {
    saveBtn.style.display = 'none';
  }
  
  loadProducts();
}

// ===== SORT PRODUCTS =====
function sortProducts(products, sortType){
  const sorted = [...products];
  switch(sortType){
    case 'newest':
      return sorted.sort((a,b) => {
        const ta = a.data.createdAt?.toMillis?.() || a.data.sortOrder || 0;
        const tb = b.data.createdAt?.toMillis?.() || b.data.sortOrder || 0;
        return tb - ta;
      });
    case 'oldest':
      return sorted.sort((a,b) => {
        const ta = a.data.createdAt?.toMillis?.() || a.data.sortOrder || 0;
        const tb = b.data.createdAt?.toMillis?.() || b.data.sortOrder || 0;
        return ta - tb;
      });
    case 'priceHigh':
      return sorted.sort((a,b) => {
        const pa = parseFloat(a.data.price) || parseFloat(a.data.colors?.[0]?.price) || 0;
        const pb = parseFloat(b.data.price) || parseFloat(b.data.colors?.[0]?.price) || 0;
        return pb - pa;
      });
    case 'priceLow':
      return sorted.sort((a,b) => {
        const pa = parseFloat(a.data.price) || parseFloat(a.data.colors?.[0]?.price) || 0;
        const pb = parseFloat(b.data.price) || parseFloat(b.data.colors?.[0]?.price) || 0;
        return pa - pb;
      });
    case 'nameAZ':
      return sorted.sort((a,b) => (a.data.name || '').localeCompare(b.data.name || '', 'ar'));
    case 'nameZA':
      return sorted.sort((a,b) => (b.data.name || '').localeCompare(a.data.name || '', 'ar'));
    case 'custom':
      return sorted.sort((a,b) => (a.data.sortOrder || 0) - (b.data.sortOrder || 0));
    default:
      return sorted;
  }
}

// ===== DRAG & DROP =====
function initDragAndDrop(){
  const items = document.querySelectorAll('.product-item');
  items.forEach(item => {
    item.draggable = true;
    item.addEventListener('dragstart', handleDragStart);
    item.addEventListener('dragover', handleDragOver);
    item.addEventListener('drop', handleDrop);
    item.addEventListener('dragend', handleDragEnd);
  });
}

function handleDragStart(e){
  draggedItem = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function handleDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const afterElement = getDragAfterElement(document.getElementById('productsList'), e.clientY);
  if(afterElement == null){
    document.getElementById('productsList').appendChild(draggedItem);
  } else {
    document.getElementById('productsList').insertBefore(draggedItem, afterElement);
  }
}

function handleDrop(e){
  e.preventDefault();
}

function handleDragEnd(){
  this.classList.remove('dragging');
  draggedItem = null;
  updateOrderNumbers();
}

function getDragAfterElement(container, y){
  const draggableElements = [...container.querySelectorAll('.product-item:not(.dragging)')];
  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if(offset < 0 && offset > closest.offset){
      return {offset: offset, element: child};
    } else {
      return closest;
    }
  }, {offset: Number.NEGATIVE_INFINITY}).element;
}

function updateOrderNumbers(){
  const items = document.querySelectorAll('.product-item');
  items.forEach((item, index) => {
    const badge = item.querySelector('.sort-badge');
    if(badge) badge.textContent = index + 1;
  });
}

// ===== SAVE CUSTOM ORDER =====
function saveCustomOrder(){
  const items = document.querySelectorAll('.product-item');
  const batch = db.batch();
  
  items.forEach((item, index) => {
    const id = item.dataset.id;
    if(id){
      const ref = db.collection("products").doc(id);
      batch.update(ref, {sortOrder: index + 1});
    }
  });
  
  batch.commit()
    .then(() => {
      showAlert('تم حفظ الترتيب الجديد بنجاح!', 'success');
      loadProducts();
    })
    .catch(err => {
      console.error("Save Order Error:", err);
      showAlert('خطأ في حفظ الترتيب: '+err.message, 'error');
    });
}

// ===== RENDER PRODUCTS =====
function renderProducts(products, searchQuery = ''){
  const list = document.getElementById('productsList');
  
  let filtered = products;
  if(searchQuery){
    filtered = products.filter(p => {
      const name = (p.data.name || '').toLowerCase();
      const price = (p.data.price || '').toString().toLowerCase();
      const colors = (p.data.colors || []).map(c => c.colorName).join(' ').toLowerCase();
      return name.includes(searchQuery) || price.includes(searchQuery) || colors.includes(searchQuery);
    });
  }
  
  filtered = sortProducts(filtered, currentSort);
  
  if(filtered.length === 0){
    list.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><p>${searchQuery ? 'لا توجد نتائج للبحث' : 'لا توجد منتجات'}</p></div>`;
    return;
  }
  
  list.innerHTML = '';
  filtered.forEach((product, index) => {
    const p = product.data;
    const isCustom = currentSort === 'custom';
    const orderBadge = isCustom ? `<span class="sort-badge">${index + 1}</span>` : '';
    const dragHandle = isCustom ? `<div class="drag-handle" title="اسحب لإعادة الترتيب"><i class="fas fa-grip-vertical"></i></div>` : '';
    
    list.innerHTML += `
      <div class="product-item" data-id="${product.id}" ${isCustom ? 'draggable="true"' : ''}>
        ${dragHandle}
        <img src="${p.image || p.colors?.[0]?.image || 'https://via.placeholder.com/70'}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/70'">
        <div class="product-info">
          <h4>${orderBadge}${p.name}</h4>
          <p>${p.price || p.colors?.[0]?.price || '0'} جنيه • ${p.colors?.length || 0} ألوان • ${formatDate(p.createdAt)}</p>
        </div>
        <div class="product-actions">
          <button class="btn btn-sm btn-warning" onclick="editProduct('${product.id}')" title="تعديل"><i class="fas fa-edit"></i></button>
          <button class="btn btn-sm btn-success" onclick="duplicateProduct('${product.id}')" title="نسخ"><i class="fas fa-copy"></i></button>
          <button class="btn btn-sm btn-danger" onclick="deleteProduct('${product.id}')" title="حذف"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `;
  });
  
  if(currentSort === 'custom'){
    initDragAndDrop();
  }
}

function formatDate(timestamp){
  if(!timestamp) return '';
  try{
    const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    return date.toLocaleDateString('ar-EG');
  } catch(e){
    return '';
  }
}

// ===== DELETE PRODUCT =====
function deleteProduct(id){
  if(confirm('هل تريد حذف هذا المنتج؟')){
    db.collection("products").doc(id).delete()
      .then(() => showAlert('تم الحذف بنجاح', 'success'))
      .catch(err => {
        console.error("Delete Error:", err);
        showAlert('خطأ: '+err.message, 'error');
      });
  }
}

// ===== LOAD PRODUCTS =====
function loadProducts(){
  const list = document.getElementById('productsList');
  list.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>';
  
  db.collection("products").onSnapshot(snap => {
    allProducts = [];
    snap.forEach(doc => {
      allProducts.push({id: doc.id, data: doc.data()});
    });
    
    const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
    renderProducts(allProducts, searchQuery);
  }, err => {
    console.error("Load Error:", err);
    list.innerHTML = `<div class="empty-state" style="color:#ff6b81;"><i class="fas fa-exclamation-triangle"></i><p>خطأ في الاتصال بـ Firebase</p></div>`;
  });
}

// ===== INIT =====
loadProducts();
</script>
