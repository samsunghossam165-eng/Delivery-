<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — Hossam Samsung</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --samsung-blue:#1428A0;
  --samsung-blue-light:#1E3BD8;
  --samsung-cyan:#00A9E0;
  --samsung-black:#000000;
  --surface:#0C0C0C;
  --card:#111111;
  --elevated:#1C1C1E;
  --border:#2C2C2E;
  --border-light:#3A3A3C;
  --text:#F5F5F7;
  --text-secondary:#8E8E93;
  --text-tertiary:#636366;
  --success:#00C853;
  --danger:#FF3B30;
  --warning:#FF9500;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Cairo',sans-serif;
  background:var(--samsung-black);
  color:var(--text);
  padding:20px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

.container{max-width:1000px;margin:auto;}

h1{
  color:var(--text);
  font-size:26px;
  margin-bottom:32px;
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:800;
  letter-spacing:-0.5px;
}
h1 i{
  font-size:22px;
  color:var(--samsung-blue);
  background:var(--elevated);
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  border-radius:12px;
  border:1px solid var(--border);
}

h2{
  font-size:18px;
  color:var(--text);
  margin:28px 0 14px;
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
}
h2 i{color:var(--samsung-cyan);font-size:16px;}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px;
  margin-bottom:20px;
  transition:border-color 0.2s;
}
.card:hover{border-color:var(--border-light);}

input,textarea,select{
  width:100%;
  padding:13px 15px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  font-family:'Cairo',sans-serif;
  font-size:14px;
  transition:all 0.2s;
}
input:focus,textarea:focus,select:focus{
  outline:none;
  border-color:var(--samsung-blue);
  box-shadow:0 0 0 3px rgba(20,40,160,0.15);
}
textarea{min-height:80px;resize:vertical;}

label{
  display:block;
  color:var(--text-secondary);
  font-size:12px;
  margin:14px 0 8px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.hint{
  color:var(--text-tertiary);
  font-size:12px;
  margin-top:4px;
}

.btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 24px;
  border-radius:10px;
  border:none;
  font-family:'Cairo',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:all 0.2s;
  margin-top:8px;
}
.btn:active{transform:scale(0.97);}

.btn-primary{
  background:var(--samsung-blue);
  color:#fff;
}
.btn-primary:hover{background:var(--samsung-blue-light);}

.btn-danger{
  background:transparent;
  color:var(--danger);
  border:1px solid rgba(255,59,48,0.3);
}
.btn-danger:hover{background:rgba(255,59,48,0.1);border-color:var(--danger);}

.btn-secondary{
  background:var(--elevated);
  color:var(--text);
  border:1px solid var(--border);
}
.btn-secondary:hover{border-color:var(--text-secondary);color:var(--text);}

.btn-success{
  background:transparent;
  color:var(--success);
  border:1px solid rgba(0,200,83,0.3);
}
.btn-success:hover{background:rgba(0,200,83,0.1);}

.btn-warning{
  background:transparent;
  color:var(--warning);
  border:1px solid rgba(255,149,0,0.3);
}
.btn-warning:hover{background:rgba(255,149,0,0.1);}

.btn-sm{padding:8px 14px;font-size:12px;margin:0;}
.btn-xs{padding:5px 10px;font-size:11px;margin:0;}

/* ===== SAMSUNG COLOR SWATCHES ===== */
.color-swatches{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:8px 0;
}
.color-swatch{
  position:relative;
  cursor:pointer;
  transition:transform 0.2s;
}
.color-swatch:hover{transform:scale(1.1);}
.color-swatch input{
  position:absolute;
  opacity:0;
  width:0;height:0;
}
.swatch-circle{
  width:36px;height:36px;
  border-radius:50%;
  border:2px solid var(--border);
  transition:all 0.2s;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.color-swatch input:checked + .swatch-circle{
  border-color:var(--samsung-blue);
  box-shadow:0 0 0 3px rgba(20,40,160,0.3);
  transform:scale(1.1);
}
.color-swatch input:checked + .swatch-circle::after{
  content:'\f00c';
  font-family:'Font Awesome 6 Free';
  font-weight:900;
  font-size:12px;
  color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,0.5);
}
.swatch-label{
  font-size:10px;
  color:var(--text-tertiary);
  text-align:center;
  margin-top:4px;
  max-width:50px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* Selected color display */
.selected-color-info{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
  padding:10px 14px;
  background:var(--surface);
  border-radius:10px;
  border:1px solid var(--border);
}
.selected-color-dot{
  width:24px;height:24px;
  border-radius:50%;
  border:2px solid var(--border);
  flex-shrink:0;
}
.selected-color-name{
  font-size:13px;
  color:var(--text-secondary);
  font-weight:600;
}
.selected-color-hex{
  font-size:11px;
  color:var(--text-tertiary);
  font-family:monospace;
  margin-right:auto;
}

/* ===== UPLOAD AREA ===== */
.upload-area{
  border:2px dashed var(--border);
  border-radius:12px;
  padding:28px;
  text-align:center;
  background:var(--surface);
  cursor:pointer;
  transition:all 0.2s;
  margin:6px 0;
  position:relative;
}
.upload-area:hover{
  border-color:var(--samsung-blue);
  background:rgba(20,40,160,0.05);
}
.upload-area.has-file{
  border-color:var(--samsung-blue);
  border-style:solid;
  background:rgba(20,40,160,0.08);
}
.upload-area i{
  font-size:28px;
  color:var(--text-tertiary);
  margin-bottom:8px;
  transition:color 0.2s;
}
.upload-area:hover i{color:var(--samsung-blue);}
.upload-area.has-file i{color:var(--samsung-cyan);}
.upload-area p{color:var(--text-secondary);font-size:13px;margin-bottom:4px;}
.upload-area .file-name{color:var(--samsung-cyan);font-weight:700;font-size:12px;}
.upload-area input[type="file"]{display:none;}

.remove-img-btn{
  position:absolute;
  top:10px;left:10px;
  background:var(--danger);
  color:#fff;border:none;border-radius:8px;
  padding:5px 10px;font-size:11px;cursor:pointer;
  display:none;font-family:'Cairo',sans-serif;z-index:10;
}
.remove-img-btn.show{display:inline-flex;}

.img-preview{
  width:100%;max-width:180px;height:120px;object-fit:cover;border-radius:10px;
  border:1px solid var(--border);margin:10px auto;display:none;
}
.img-preview.show{display:block;}

.progress-bar{
  width:100%;height:4px;background:var(--elevated);border-radius:2px;
  margin:10px 0;overflow:hidden;display:none;
}
.progress-bar.show{display:block;}
.progress-bar-fill{
  height:100%;background:var(--samsung-blue);border-radius:2px;
  transition:width 0.3s;width:0%;
}
.progress-text{color:var(--samsung-cyan);font-size:11px;text-align:center;margin-top:4px;display:none;}
.progress-text.show{display:block;}

/* ===== PRODUCT ITEM ===== */
.product-item{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;padding:14px;
  margin-bottom:10px;transition:all 0.2s;
}
.product-item:hover{
  border-color:var(--border-light);
  transform:translateY(-1px);
}
.product-item img{
  width:60px;height:60px;object-fit:cover;
  border-radius:10px;background:var(--card);
}
.product-info{flex:1;}
.product-info h4{font-size:16px;color:var(--text);margin-bottom:2px;font-weight:700;}
.product-info p{color:var(--text-secondary);font-size:13px;}
.product-actions{display:flex;gap:6px;flex-wrap:wrap;}
.product-actions button{padding:8px 14px;font-size:12px;margin:0;}

/* ===== COLOR ROW ===== */
.color-row{
  display:flex;gap:10px;align-items:flex-start;
  background:var(--surface);
  border:1px solid var(--border);border-radius:12px;
  padding:14px;margin:8px 0;
}
.color-row > div:first-child{flex:1;display:flex;flex-direction:column;gap:6px;}
.color-row input{flex:1;margin:0;}
.color-row .upload-area{padding:18px;}
.color-row .upload-area i{font-size:18px;}
.color-row .upload-area p{font-size:11px;}
.color-row .btn{padding:8px 12px;font-size:11px;margin:0;}

/* ===== ALERTS ===== */
.alert{
  padding:14px 18px;border-radius:10px;margin-bottom:18px;
  font-weight:700;font-size:14px;display:none;
  border:1px solid transparent;
}
.alert-success{background:rgba(0,200,83,0.08);border-color:rgba(0,200,83,0.2);color:var(--success);}
.alert-error{background:rgba(255,59,48,0.08);border-color:rgba(255,59,48,0.2);color:var(--danger);}
.alert-info{background:rgba(0,169,224,0.08);border-color:rgba(0,169,224,0.2);color:var(--samsung-cyan);}

/* ===== TABS ===== */
.tabs{
  display:flex;gap:6px;margin-bottom:22px;
  border-bottom:1px solid var(--border);
  padding-bottom:14px;flex-wrap:wrap;
}
.tab{
  padding:10px 20px;border-radius:10px;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text-secondary);
  cursor:pointer;transition:all 0.2s;
  font-weight:700;font-size:14px;
}
.tab:hover{color:var(--text);border-color:var(--border-light);}
.tab.active{
  background:var(--samsung-blue);
  color:#fff;border-color:var(--samsung-blue);
}
.tab-content{display:none;}
.tab-content.active{display:block;}

.empty-state{text-align:center;padding:50px 20px;color:var(--text-secondary);}
.empty-state i{font-size:40px;color:var(--text-tertiary);margin-bottom:12px;}

.search-box{display:flex;gap:8px;margin-bottom:16px;}
.search-box input{flex:1;margin:0;}

.order-controls{
  display:flex;gap:8px;align-items:center;margin-bottom:14px;
}
.order-controls select{
  width:auto;padding:8px 14px;margin:0;font-size:13px;
}

/* ===== MODAL ===== */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.9);z-index:1000;
  justify-content:center;align-items:center;padding:20px;
}
.modal-overlay.active{display:flex;}
.modal-content{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  max-width:480px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;
}
.modal-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;
}
.modal-header h3{color:var(--text);font-size:20px;font-weight:800;}
.modal-close{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text-secondary);width:36px;height:36px;
  border-radius:10px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.modal-close:hover{color:var(--text);border-color:var(--text-secondary);}

.preview-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:18px;text-align:center;
}
.preview-card img{
  width:100%;max-width:220px;height:auto;border-radius:12px;margin-bottom:12px;
}
.preview-card h4{font-size:20px;color:var(--text);margin-bottom:6px;font-weight:800;}
.preview-card .spec{color:var(--text-secondary);font-size:13px;}
.preview-colors{
  display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap;
}
.preview-color{
  display:flex;align-items:center;gap:5px;background:var(--card);
  border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;
}
.preview-color-dot{width:14px;height:14px;border-radius:50%;}

/* ===== DRAG & DROP ===== */
.drag-handle{
  color:var(--text-tertiary);cursor:grab;padding:6px;font-size:16px;
}
.drag-handle:active{cursor:grabbing;}
.product-item.dragging{opacity:0.4;border-color:var(--samsung-blue);}

.sort-badge{
  background:var(--samsung-blue);color:#fff;font-size:10px;font-weight:800;
  padding:2px 8px;border-radius:6px;margin-left:8px;
}

hr{border:none;border-top:1px solid var(--border);margin:22px 0;}

@media(max-width:768px){
  body{padding:14px;}
  .card{padding:18px;}
  h1{font-size:20px;}
  h1 i{width:36px;height:36px;font-size:18px;}
  .color-swatches{gap:8px;}
  .swatch-circle{width:32px;height:32px;}
  .color-row{flex-direction:column;}
  .color-row > div:first-child{width:100%;}
  .color-row .upload-area{width:100%;}
  .product-item{flex-direction:column;text-align:center;padding:18px;}
  .product-actions{width:100%;justify-content:center;}
  .order-controls{flex-direction:column;align-items:stretch;}
  .order-controls select{width:100%;}
  .tabs{gap:4px;}
  .tab{padding:8px 14px;font-size:13px;}
}
</style>
</head>
<body>
<div class="container">
  <h1><i class="fas fa-cog"></i> لوحة تحكم Hossam Samsung</h1>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('add',this)"><i class="fas fa-plus"></i> إضافة منتج</div>
    <div class="tab" onclick="switchTab('list',this)"><i class="fas fa-list"></i> المنتجات</div>
  </div>

  <div id="alertBox" class="alert"></div>

  <!-- ADD / EDIT PRODUCT -->
  <div id="tab-add" class="tab-content active">
    <div class="card">
      <h2 id="formTitle"><i class="fas fa-plus-circle"></i> منتج جديد</h2>
      
      <input type="hidden" id="editId" value="">
      
      <label>اسم المنتج</label>
      <input id="name" placeholder="مثال: Galaxy S24 Ultra">
      
      <!-- Main Image Upload -->
      <label>صورة المنتج الأساسية</label>
      <input type="hidden" id="imageUrl" value="">
      <div class="upload-area" id="mainUploadArea" onclick="document.getElementById('mainImageFile').click()">
        <input type="file" id="mainImageFile" accept="image/*" onchange="handleMainImageUpload(this)">
        <button class="remove-img-btn" id="mainRemoveBtn" onclick="removeMainImage(event)"><i class="fas fa-trash"></i> إزالة</button>
        <i class="fas fa-cloud-upload-alt"></i>
        <p>اضغط هنا أو اسحب صورة للرفع</p>
        <p class="file-name" id="mainFileName"></p>
        <img class="img-preview" id="mainImgPreview" alt="preview">
        <div class="progress-bar" id="mainProgressBar"><div class="progress-bar-fill" id="mainProgressFill"></div></div>
        <div class="progress-text" id="mainProgressText">0%</div>
      </div>
      <p class="hint">الصورة هترفع على Cloudinary تلقائياً</p>
      
      <!-- Samsung Color Swatches - Main -->
      <label>لون المنتج الأساسي <span style="color:var(--text-tertiary);font-weight:400;">— اختر من ألوان سامسونج</span></label>
      <div class="color-swatches" id="mainColorSwatches"></div>
      <input type="hidden" id="mainColorHex" value="#4A4A4A">
      <input type="hidden" id="mainColorName" value="Titanium Gray">
      <div class="selected-color-info" id="mainSelectedColorInfo">
        <div class="selected-color-dot" id="mainColorPreview" style="background:#4A4A4A"></div>
        <span class="selected-color-name" id="mainColorNameDisplay">Titanium Gray</span>
        <span class="selected-color-hex" id="mainColorHexDisplay">#4A4A4A</span>
      </div>
      
      <label>المواصفات الأساسية</label>
      <textarea id="spec" placeholder="256GB / 12GB RAM • Dual SIM • Box + Cable"></textarea>
      
      <hr>
      
      <h2><i class="fas fa-palette"></i> الألوان (اختياري)</h2>
      <p class="hint">لو المنتج له أكتر من لون ومواصفات مختلفة، ضيفهم هنا. كل لون ممكن يرفع صورته.</p>
      
      <div id="colorsContainer"></div>
      <button class="btn btn-secondary" onclick="addColorRow()"><i class="fas fa-plus"></i> إضافة لون</button>
      
      <hr>
      
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="saveProduct()"><i class="fas fa-save"></i> <span id="saveBtnText">حفظ المنتج</span></button>
        <button class="btn btn-secondary" onclick="previewProduct()"><i class="fas fa-eye"></i> معاينة</button>
        <button class="btn btn-danger" onclick="resetForm()" id="cancelBtn" style="display:none;"><i class="fas fa-times"></i> إلغاء</button>
      </div>
    </div>
  </div>

  <!-- LIST PRODUCTS -->
  <div id="tab-list" class="tab-content">
    <div class="card">
      <h2><i class="fas fa-boxes"></i> المنتجات المضافة</h2>
      
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث باسم المنتج..." oninput="filterProducts()">
      </div>
      
      <div class="order-controls">
        <label style="margin:0;color:var(--text-secondary);">الترتيب:</label>
        <select id="sortOrder" onchange="changeSortOrder()">
          <option value="newest">الأحدث أولاً</option>
          <option value="oldest">الأقدم أولاً</option>
          <option value="nameAZ">الاسم أ-ي</option>
          <option value="nameZA">الاسم ي-أ</option>
          <option value="custom">ترتيب يدوي (سحب وإفلات)</option>
        </select>
        <button class="btn btn-sm btn-secondary" onclick="saveCustomOrder()" id="saveOrderBtn" style="display:none;">
          <i class="fas fa-save"></i> حفظ الترتيب
        </button>
      </div>
      
      <div id="productsList">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3><i class="fas fa-eye"></i> معاينة المنتج</h3>
      <button class="modal-close" onclick="closePreview()"><i class="fas fa-times"></i></button>
    </div>
    <div id="previewBody"></div>
  </div>
</div>

// ===== CLOUDINARY UPLOAD =====
function uploadToCloudinary(file, onProgress, onComplete, onError){
  if(!file) return;
  const url = `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`;
  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  
  const xhr = new XMLHttpRequest();
  xhr.upload.addEventListener('progress', (e) => {
    if(e.lengthComputable){
      onProgress((e.loaded / e.total) * 100);
    }
  });
  xhr.addEventListener('load', () => {
    if(xhr.status === 200){
      try {
        const response = JSON.parse(xhr.responseText);
        if(response.secure_url){onComplete(response.secure_url);}
        else {onError(new Error('No secure_url'));}
      } catch(e){onError(new Error('Invalid response'));}
    } else {
      try {const err=JSON.parse(xhr.responseText);onError(new Error(err.error?.message||'Upload failed'));}
      catch(e){onError(new Error('Upload failed'));}
    }
  });
  xhr.addEventListener('error', () => onError(new Error('Network error')));
  xhr.open('POST', url);
  xhr.send(formData);
}

// ===== MAIN IMAGE =====
function handleMainImageUpload(input){
  const file = input.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){showAlert('الملف لازم يكون صورة', 'error');return;}
  
  const area = document.getElementById('mainUploadArea');
  const preview = document.getElementById('mainImgPreview');
  const fileName = document.getElementById('mainFileName');
  const progressBar = document.getElementById('mainProgressBar');
  const progressFill = document.getElementById('mainProgressFill');
  const progressText = document.getElementById('mainProgressText');
  const removeBtn = document.getElementById('mainRemoveBtn');
  
  area.classList.add('has-file');
  fileName.textContent = file.name;
  preview.src = URL.createObjectURL(file);
  preview.classList.add('show');
  progressBar.classList.add('show');
  progressText.classList.add('show');
  removeBtn.classList.add('show');
  
  uploadToCloudinary(file,
    (p) => {progressFill.style.width=p+'%';progressText.textContent=Math.round(p)+'%';},
    (url) => {
      document.getElementById('imageUrl').value = url;
      progressFill.style.width='100%';
      progressText.textContent='تم الرفع ✓';
      progressText.style.color='var(--success)';
      showAlert('تم رفع الصورة بنجاح!', 'success');
      setTimeout(()=>{progressBar.classList.remove('show');progressText.classList.remove('show');},2000);
    },
    (err) => {
      progressText.textContent='فشل الرفع';
      progressText.style.color='var(--danger)';
      removeBtn.classList.remove('show');
      showAlert('فشل رفع الصورة: '+err.message, 'error');
    }
  );
}

// ===== SAVE PRODUCT =====
function saveProduct(){
  const editId = document.getElementById('editId').value;
  const name = document.getElementById('name').value.trim();
  const image = document.getElementById('imageUrl').value.trim();
  const spec = document.getElementById('spec').value.trim();
  const mainColorHex = document.getElementById('mainColorHex').value.trim();
  const mainColorName = document.getElementById('mainColorName').value.trim();
  
  if(!name){showAlert('اكتب اسم المنتج', 'error'); return;}
  
  const colorRows = document.querySelectorAll('.color-row');
  const colors = [];
  colorRows.forEach(row => {
    const nameInput = row.querySelector('.c-name');
    const urlInput = row.querySelector('.c-image-hidden');
    const specInput = row.querySelector('.c-spec');
    const hexInput = row.querySelector('.c-hex');
    
    if(nameInput && nameInput.value.trim()){
      colors.push({
        colorName: nameInput.value.trim(),
        image: urlInput ? urlInput.value.trim() : '',
        spec: specInput ? specInput.value.trim() : '',
        colorHex: hexInput ? (hexInput.value.trim() || '#4A4A4A') : '#4A4A4A'
      });
    }
  });
  
  const data = {
    name: name,
    image: image,
    spec: spec,
    mainColorHex: mainColorHex || '#4A4A4A',
    mainColorName: mainColorName || 'Titanium Gray',
    colors: colors.length > 0 ? colors : null,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  
  if(!data.image) delete data.image;
  if(!data.spec) delete data.spec;
  if(!data.colors) delete data.colors;
  
  if(editId){
    db.collection("products").doc(editId).update(data)
      .then(() => {
        showAlert('تم تعديل المنتج بنجاح!', 'success');
        resetForm();
        switchTab('list', document.querySelectorAll('.tab')[1]);
      })
      .catch(err => {console.error(err);showAlert('خطأ: '+err.message, 'error');});
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    data.sortOrder = Date.now();
    db.collection("products").add(data)
      .then(() => {
        showAlert('تمت إضافة المنتج بنجاح!', 'success');
        resetForm();
      })
      .catch(err => {console.error(err);showAlert('خطأ: '+err.message, 'error');});
  }
}

function sortProducts(products, sortType){
  const sorted = [...products];
  switch(sortType){
    case 'newest':
      return sorted.sort((a,b) => {
        const ta = a.data.createdAt?.toMillis?.() || a.data.sortOrder || 0;
        const tb = b.data.createdAt?.toMillis?.() || b.data.sortOrder || 0;
        return tb - ta;
      });
    case 'oldest':
      return sorted.sort((a,b) => {
        const ta = a.data.createdAt?.toMillis?.() || a.data.sortOrder || 0;
        const tb = b.data.createdAt?.toMillis?.() || b.data.sortOrder || 0;
        return ta - tb;
      });
    case 'nameAZ':
      return sorted.sort((a,b) => (a.data.name || '').localeCompare(b.data.name || '', 'ar'));
    case 'nameZA':
      return sorted.sort((a,b) => (b.data.name || '').localeCompare(a.data.name || '', 'ar'));
    case 'custom':
      return sorted.sort((a,b) => (a.data.sortOrder || 0) - (b.data.sortOrder || 0));
    default:
      return sorted;
  }
}

// ===== DRAG & DROP =====
function initDragAndDrop(){
  const items = document.querySelectorAll('.product-item');
  items.forEach(item => {
    item.draggable = true;
    item.addEventListener('dragstart', handleDragStart);
    item.addEventListener('dragover', handleDragOver);
    item.addEventListener('drop', handleDrop);
    item.addEventListener('dragend', handleDragEnd);
  });
}
function handleDragStart(e){
  draggedItem = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function handleDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const afterElement = getDragAfterElement(document.getElementById('productsList'), e.clientY);
  if(afterElement == null){
    document.getElementById('productsList').appendChild(draggedItem);
  } else {
    document.getElementById('productsList').insertBefore(draggedItem, afterElement);
  }
}
function handleDrop(e){e.preventDefault();}
function handleDragEnd(){
  this.classList.remove('dragging');
  draggedItem = null;
  updateOrderNumbers();
}
function getDragAfterElement(container, y){
  const draggableElements = [...container.querySelectorAll('.product-item:not(.dragging)')];
  return draggableElements.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if(offset < 0 && offset > closest.offset){
      return {offset: offset, element: child};
    } else {
      return closest;
    }
  }, {offset: Number.NEGATIVE_INFINITY}).element;
}
function updateOrderNumbers(){
  const items = document.querySelectorAll('.product-item');
  items.forEach((item, index) => {
    const badge = item.querySelector('.sort-badge');
    if(badge) badge.textContent = index + 1;
  });
}

function saveCustomOrder(){
  const items = document.querySelectorAll('.product-item');
  const batch = db.batch();
  items.forEach((item, index) => {
    const id = item.dataset.id;
    if(id){
      const ref = db.collection("products").doc(id);
      batch.update(ref, {sortOrder: index + 1});
    }
  });
  batch.commit()
    .then(() => {showAlert('تم حفظ الترتيب الجديد بنجاح!', 'success');loadProducts();})
    .catch(err => {console.error(err);showAlert('خطأ في حفظ الترتيب: '+err.message, 'error');});
}

// ===== RENDER =====
function renderProducts(products, searchQuery = ''){
  const list = document.getElementById('productsList');
  let filtered = products;
  if(searchQuery){
    filtered = products.filter(p => {
      const name = (p.data.name || '').toLowerCase();
      const colors = (p.data.colors || []).map(c => c.colorName).join(' ').toLowerCase();
      return name.includes(searchQuery) || colors.includes(searchQuery);
    });
  }
  filtered = sortProducts(filtered, currentSort);
  
  if(filtered.length === 0){
    list.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><p>${searchQuery ? 'لا توجد نتائج للبحث' : 'لا توجد منتجات'}</p></div>`;
    return;
  }
  
  list.innerHTML = '';
  filtered.forEach((product, index) => {
    const p = product.data;
    const isCustom = currentSort === 'custom';
    const orderBadge = isCustom ? `<span class="sort-badge">${index + 1}</span>` : '';
    const dragHandle = isCustom ? `<div class="drag-handle" title="اسحب لإعادة الترتيب"><i class="fas fa-grip-vertical"></i></div>` : '';
    const mainColorDot = p.mainColorHex ? `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${p.mainColorHex};margin-left:6px;border:1px solid var(--border);"></span>` : '';
    
    list.innerHTML += `
      <div class="product-item" data-id="${product.id}" ${isCustom ? 'draggable="true"' : ''}>
        ${dragHandle}
        <img src="${p.image || p.colors?.[0]?.image || 'https://via.placeholder.com/70'}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/70'">
        <div class="product-info">
          <h4>${orderBadge}${p.name}${mainColorDot}</h4>
          <p>${p.colors?.length || 0} ألوان • ${formatDate(p.createdAt)}</p>
        </div>
        <div class="product-actions">
          <button class="btn btn-sm btn-warning" onclick="editProduct('${product.id}')" title="تعديل"><i class="fas fa-edit"></i></button>
          <button class="btn btn-sm btn-success" onclick="duplicateProduct('${product.id}')" title="نسخ"><i class="fas fa-copy"></i></button>
          <button class="btn btn-sm btn-danger" onclick="deleteProduct('${product.id}')" title="حذف"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `;
  });
  if(currentSort === 'custom') initDragAndDrop();
}

function formatDate(timestamp){
  if(!timestamp) return '';
  try{
    const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    return date.toLocaleDateString('ar-EG');
  } catch(e){return '';}
}

// ===== DELETE =====
function deleteProduct(id){
  if(confirm('هل تريد حذف هذا المنتج؟')){
    db.collection("products").doc(id).delete()
      .then(() => showAlert('تم الحذف بنجاح', 'success'))
      .catch(err => {console.error(err);showAlert('خطأ: '+err.message, 'error');});
  }
}

// ===== LOAD =====
function loadProducts(){
  const list = document.getElementById('productsList');
  list.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>جاري التحميل...</p></div>';
  
  db.collection("products").onSnapshot(snap => {
    allProducts = [];
    snap.forEach(doc => {allProducts.push({id: doc.id, data: doc.data()});});
    const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
    renderProducts(allProducts, searchQuery);
  }, err => {
    console.error(err);
    list.innerHTML = `<div class="empty-state" style="color:var(--danger);"><i class="fas fa-exclamation-triangle"></i><p>خطأ في الاتصال بـ Firebase</p></div>`;
  });
}

loadProducts();
</script>
